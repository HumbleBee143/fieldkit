<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patch Panel Mapper — FieldKit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0b1220;
    --navy-mid: #111c2e;
    --navy-light: #1a2840;
    --navy-border: #1f3352;
    --blue: #2d7dd2;
    --accent: #00c8ff;
    --white: #f0f5fc;
    --slate: #8aa4c4;
    --muted: #4a6484;

    --type-pc:      #2d7dd2;
    --type-phone:   #27ae60;
    --type-printer: #e67e22;
    --type-server:  #8e44ad;
    --type-ap:      #00bcd4;
    --type-camera:  #e74c3c;
    --type-spare:   #546e7a;
    --type-other:   #f39c12;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Geist', sans-serif;
    background: var(--navy);
    color: var(--white);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    background: var(--navy-mid);
    border-bottom: 1px solid var(--navy-border);
    padding: 0 1.5rem;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    gap: 1rem;
  }

  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--white);
    text-decoration: none;
    white-space: nowrap;
  }
  .logo span { color: var(--accent); }

  .site-name-wrap {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex: 1;
    max-width: 360px;
  }

  .site-name-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  .site-name-input {
    background: var(--navy-light);
    border: 1px solid var(--navy-border);
    border-radius: 4px;
    color: var(--white);
    font-family: 'Geist', sans-serif;
    font-size: 0.82rem;
    padding: 0.35rem 0.65rem;
    outline: none;
    flex: 1;
    transition: border-color 0.15s;
  }
  .site-name-input:focus { border-color: var(--blue); }
  .site-name-input::placeholder { color: var(--muted); }

  .header-actions {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  .btn {
    background: var(--navy-light);
    border: 1px solid var(--navy-border);
    color: var(--slate);
    border-radius: 4px;
    padding: 0.35rem 0.75rem;
    font-family: 'Geist', sans-serif;
    font-size: 0.72rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 0.35rem;
  }
  .btn:hover { border-color: var(--blue); color: var(--white); }
  .btn.primary { background: var(--blue); border-color: var(--blue); color: white; }
  .btn.primary:hover { background: #3d8fe8; }
  .btn svg { width: 13px; height: 13px; flex-shrink: 0; }

  /* ── Workspace ── */
  .workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 240px;
    background: var(--navy-mid);
    border-right: 1px solid var(--navy-border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--navy-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .sidebar-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .btn-add-panel {
    background: none;
    border: 1px solid var(--navy-border);
    color: var(--slate);
    border-radius: 3px;
    width: 22px;
    height: 22px;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .btn-add-panel:hover { border-color: var(--accent); color: var(--accent); }

  .panels-list {
    flex: 1;
    overflow-y: auto;
    padding: 0.5rem;
  }
  .panels-list::-webkit-scrollbar { width: 3px; }
  .panels-list::-webkit-scrollbar-thumb { background: var(--navy-border); }

  .panel-item {
    border-radius: 5px;
    padding: 0.6rem 0.75rem;
    cursor: pointer;
    transition: background 0.12s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
    margin-bottom: 0.25rem;
  }
  .panel-item:hover { background: var(--navy-light); }
  .panel-item.active { background: var(--navy-light); border: 1px solid var(--navy-border); }

  .panel-item-info { flex: 1; min-width: 0; }

  .panel-item-name {
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--white);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .panel-item-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58rem;
    color: var(--muted);
    margin-top: 0.15rem;
  }

  .btn-remove-panel {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.9rem;
    padding: 0.1rem 0.2rem;
    border-radius: 2px;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .btn-remove-panel:hover { color: #e74c3c; }

  /* Legend */
  .legend {
    border-top: 1px solid var(--navy-border);
    padding: 0.75rem 1rem;
    flex-shrink: 0;
  }

  .legend-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.56rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .legend-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.25rem 0.5rem;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    font-size: 0.68rem;
    color: var(--slate);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── Main ── */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }
  .main::-webkit-scrollbar { width: 4px; }
  .main::-webkit-scrollbar-thumb { background: var(--navy-border); }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    color: var(--muted);
  }
  .empty-state-icon { font-size: 2.5rem; opacity: 0.4; }
  .empty-state-text { font-size: 0.82rem; }

  /* Panel editor */
  .panel-editor {
    background: var(--navy-mid);
    border: 1px solid var(--navy-border);
    border-radius: 6px;
    overflow: hidden;
  }

  .panel-editor-header {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--navy-border);
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .panel-name-input {
    background: transparent;
    border: none;
    color: var(--white);
    font-family: 'Geist', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    outline: none;
    flex: 1;
  }
  .panel-name-input::placeholder { color: var(--muted); }

  .port-count-select {
    background: var(--navy-light);
    border: 1px solid var(--navy-border);
    color: var(--slate);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    padding: 0.25rem 0.5rem;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }

  .port-numbering-wrap {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .port-numbering-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .port-numbering-input {
    background: var(--navy-light);
    border: 1px solid var(--navy-border);
    border-radius: 3px;
    color: var(--slate);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    padding: 0.25rem 0.4rem;
    outline: none;
    width: 52px;
  }

  .port-prefix-input {
    background: var(--navy-light);
    border: 1px solid var(--navy-border);
    border-radius: 3px;
    color: var(--slate);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    padding: 0.25rem 0.4rem;
    outline: none;
    width: 52px;
  }

  .port-numbering-input:focus,
  .port-prefix-input:focus { border-color: var(--blue); }

  .panel-body { padding: 1.25rem; }

  /* Port grid */
  .port-grid {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .port-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .port {
    width: 60px;
    height: 60px;
    border-radius: 5px;
    border: 1.5px solid var(--navy-border);
    background: var(--navy-light);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    position: relative;
    flex-shrink: 0;
  }

  .port:hover { border-color: var(--accent); transform: translateY(-1px); }
  .port.labelled { border-color: transparent; }
  .port.selected { outline: 2px solid var(--accent); outline-offset: 1px; }

  .port-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem;
    color: var(--muted);
    line-height: 1;
  }

  .port.labelled .port-num { color: rgba(255,255,255,0.6); }

  .port-type {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    font-weight: 600;
    color: white;
    line-height: 1;
    margin-top: 2px;
  }

  .port-label-text {
    font-size: 0.5rem;
    color: rgba(255,255,255,0.7);
    line-height: 1;
    margin-top: 2px;
    max-width: 54px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    text-align: center;
    padding: 0 2px;
  }

  /* ── Port Editor Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--navy-mid);
    border: 1px solid var(--navy-border);
    border-radius: 8px;
    width: 320px;
    overflow: hidden;
    transform: translateY(8px);
    transition: transform 0.15s;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-header {
    background: var(--navy-light);
    padding: 0.75rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--navy-border);
  }

  .modal-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.1rem;
    line-height: 1;
    padding: 0 0.2rem;
    transition: color 0.12s;
  }
  .modal-close:hover { color: var(--white); }

  .modal-body { padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }

  .modal-field label {
    display: block;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--slate);
    margin-bottom: 0.3rem;
  }

  .modal-field select,
  .modal-field input[type="text"] {
    width: 100%;
    background: var(--navy-light);
    border: 1px solid var(--navy-border);
    border-radius: 4px;
    color: var(--white);
    font-family: 'Geist', sans-serif;
    font-size: 0.82rem;
    padding: 0.4rem 0.65rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .modal-field select:focus,
  .modal-field input:focus { border-color: var(--blue); }
  .modal-field select option { background: var(--navy-mid); }

  .cable-colours {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }

  .cable-colour-btn {
    width: 28px;
    height: 28px;
    border-radius: 4px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.12s;
    flex-shrink: 0;
  }
  .cable-colour-btn:hover { transform: scale(1.1); }
  .cable-colour-btn.selected { border-color: white !important; transform: scale(1.15); box-shadow: 0 0 0 2px rgba(255,255,255,0.4); }

  .modal-footer {
    padding: 0.75rem 1rem;
    border-top: 1px solid var(--navy-border);
    display: flex;
    gap: 0.5rem;
    justify-content: space-between;
  }

  /* ── Print Styles ── */
  @media print {
    @page { size: A4; margin: 12mm; }

    body { background: white; overflow: visible; height: auto; }
    .header, .sidebar, .modal-overlay { display: none !important; }
    .workspace { display: block; height: auto; overflow: visible; }
    .main { overflow: visible; padding: 0; }

    .print-doc { display: block !important; }
    .panel-editor { display: none !important; }
    .empty-state { display: none !important; }
  }

  /* Print document */
  .print-doc {
    display: none;
    font-family: 'Geist', sans-serif;
  }

  .print-header {
    border-bottom: 2px solid #0f2040;
    padding-bottom: 0.6rem;
    margin-bottom: 1.2rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .print-site-name {
    font-size: 1.1rem;
    font-weight: 700;
    color: #0f2040;
  }

  .print-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58rem;
    color: #6b7c93;
  }

  .print-panel {
    margin-bottom: 1.5rem;
    page-break-inside: avoid;
  }

  .print-panel-title {
    font-size: 0.72rem;
    font-weight: 600;
    color: #2d7dd2;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
    padding-bottom: 0.25rem;
    border-bottom: 1px solid #d0dce8;
  }

  .print-port-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.65rem;
  }

  .print-port-table th {
    background: #f0f5fa;
    font-weight: 600;
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #6b7c93;
    padding: 0.3rem 0.5rem;
    text-align: left;
    border-bottom: 1px solid #d0dce8;
  }

  .print-port-table td {
    padding: 0.25rem 0.5rem;
    border-bottom: 1px solid #f0f4f8;
    color: #1a2840;
    font-family: 'JetBrains Mono', monospace;
  }

  .print-port-table td.label-col {
    font-family: 'Geist', sans-serif;
    font-weight: 500;
  }

  .print-type-badge {
    display: inline-block;
    padding: 0.1rem 0.35rem;
    border-radius: 2px;
    font-size: 0.55rem;
    font-weight: 600;
    color: white;
  }

  .print-cable-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    border: 1px solid rgba(0,0,0,0.1);
  }

  .print-footer {
    margin-top: 1.5rem;
    border-top: 1px solid #d0dce8;
    padding-top: 0.5rem;
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.5rem;
    color: #aab8c8;
  }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <a href="/" class="logo">Field<span>Kit</span></a>
  <div class="site-name-wrap">
    <span class="site-name-label">Site</span>
    <input type="text" class="site-name-input" id="siteName" placeholder="Site name..." oninput="state.siteName = this.value">
  </div>
  <div class="header-actions">
    <button class="btn" onclick="saveJSON()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Save
    </button>
    <label class="btn" style="cursor:pointer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Load
      <input type="file" accept=".json" style="display:none" onchange="loadJSON(event)">
    </label>
    <button class="btn primary" onclick="printMap()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      Print
    </button>
  </div>
</header>

<div class="workspace">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Panels</span>
      <button class="btn-add-panel" onclick="addPanel()" title="Add panel">+</button>
    </div>
    <div class="panels-list" id="panelsList"></div>
    <div class="legend">
      <div class="legend-title">Device Types</div>
      <div class="legend-grid">
        <div class="legend-item"><div class="legend-dot" style="background:var(--type-pc)"></div>PC</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--type-phone)"></div>Phone</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--type-printer)"></div>Printer</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--type-server)"></div>Server</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--type-ap)"></div>AP</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--type-camera)"></div>Camera</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--type-spare)"></div>Spare</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--type-other)"></div>Other</div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main" id="main">
    <div class="empty-state" id="emptyState">
      <div class="empty-state-icon">🔌</div>
      <div class="empty-state-text">Add a panel to get started</div>
    </div>
  </main>

</div>

<!-- Port Editor Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Port 01</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label>Device Type</label>
        <select id="editType" onchange="updateTypeColour()">
          <option value="">— Unassigned —</option>
          <option value="PC">PC</option>
          <option value="Phone">Phone</option>
          <option value="Printer">Printer</option>
          <option value="Server">Server</option>
          <option value="AP">AP</option>
          <option value="Camera">Camera</option>
          <option value="Spare">Spare</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="modal-field">
        <label>Label</label>
        <input type="text" id="editLabel" placeholder="e.g. Desk 12, Reception, NVR...">
      </div>
      <div class="modal-field">
        <label>Cable Colour</label>
        <div class="cable-colours" id="cableColours">
          <button class="cable-colour-btn" style="background:#2563eb" data-colour="blue" onclick="selectColour('blue',this)" title="Blue"></button>
          <button class="cable-colour-btn" style="background:#dc2626" data-colour="red" onclick="selectColour('red',this)" title="Red"></button>
          <button class="cable-colour-btn" style="background:#16a34a" data-colour="green" onclick="selectColour('green',this)" title="Green"></button>
          <button class="cable-colour-btn" style="background:#ca8a04" data-colour="yellow" onclick="selectColour('yellow',this)" title="Yellow"></button>
          <button class="cable-colour-btn" style="background:#6b7280" data-colour="grey" onclick="selectColour('grey',this)" title="Grey"></button>
          <button class="cable-colour-btn" style="background:#e5e7eb;border:1px solid #9ca3af" data-colour="white" onclick="selectColour('white',this)" title="White"></button>
          <button class="cable-colour-btn" style="background:#f97316" data-colour="orange" onclick="selectColour('orange',this)" title="Orange"></button>
          <button class="cable-colour-btn" style="background:#7c3aed" data-colour="purple" onclick="selectColour('purple',this)" title="Purple"></button>
        </div>
      </div>
      <div class="modal-field" style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem">
        <div>
          <label>Switch</label>
          <input type="text" id="editSwitch" placeholder="e.g. SW01">
        </div>
        <div>
          <label>Switch Port</label>
          <input type="text" id="editSwitchPort" placeholder="e.g. Gi0/1">
        </div>
      </div>
      <div class="modal-field">
        <label>Notes</label>
        <input type="text" id="editNotes" placeholder="Optional notes...">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="clearPort()">Clear Port</button>
      <button class="btn primary" onclick="savePort()">Save</button>
    </div>
  </div>
</div>

<!-- Print Document (hidden until print) -->
<div class="print-doc" id="printDoc"></div>

<script>
const TYPES = {
  'PC':      { color: '#2d7dd2', abbr: 'PC' },
  'Phone':   { color: '#27ae60', abbr: 'PH' },
  'Printer': { color: '#e67e22', abbr: 'PR' },
  'Server':  { color: '#8e44ad', abbr: 'SV' },
  'AP':      { color: '#00bcd4', abbr: 'AP' },
  'Camera':  { color: '#e74c3c', abbr: 'CM' },
  'Spare':   { color: '#546e7a', abbr: 'SP' },
  'Other':   { color: '#f39c12', abbr: 'OT' },
};

const CABLE_COLOURS = {
  blue: '#2563eb', red: '#dc2626', green: '#16a34a',
  yellow: '#ca8a04', grey: '#6b7280', white: '#e5e7eb',
  orange: '#f97316', purple: '#7c3aed'
};

let state = {
  siteName: '',
  panels: [],
  activePanel: null,
};

let editingPanelId = null;
let editingPortIndex = null;
let selectedColour = null;
let panelCounter = 0;

function uid() { return 'p' + (++panelCounter) + '_' + Date.now(); }

function addPanel() {
  const id = uid();
  const panel = {
    id,
    name: `Panel ${state.panels.length + 1}`,
    portCount: 24,
    startFrom: 1,
    prefix: '',
    ports: {},
  };
  state.panels.push(panel);
  state.activePanel = id;
  render();
}

function removePanel(id) {
  state.panels = state.panels.filter(p => p.id !== id);
  if (state.activePanel === id) {
    state.activePanel = state.panels.length ? state.panels[state.panels.length - 1].id : null;
  }
  render();
}

function setActivePanel(id) {
  state.activePanel = id;
  renderSidebar();
  const el = document.getElementById('editor_' + id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function getPanel(id) { return state.panels.find(p => p.id === id); }

function portCountChanged(id, val) {
  const panel = getPanel(id);
  if (!panel) return;
  panel.portCount = parseInt(val);
  render();
}

function panelNameChanged(id, val) {
  const panel = getPanel(id);
  if (!panel) return;
  panel.name = val;
  render();
}

function panelStartFromChanged(id, val) {
  const panel = getPanel(id);
  if (!panel) return;
  const n = parseInt(val);
  panel.startFrom = isNaN(n) ? 1 : Math.max(1, n);
  render();
}

function panelPrefixChanged(id, val) {
  const panel = getPanel(id);
  if (!panel) return;
  panel.prefix = val;
  render();
}

// ── Render ──────────────────────────────────
function render() {
  renderSidebar();
  renderMain();
}

function renderSidebar() {
  const list = document.getElementById('panelsList');
  list.innerHTML = state.panels.map(p => {
    const used = Object.keys(p.ports).length;
    const active = p.id === state.activePanel ? 'active' : '';
    return `
      <div class="panel-item ${active}" onclick="setActivePanel('${p.id}')">
        <div class="panel-item-info">
          <div class="panel-item-name">${escHtml(p.name)}</div>
          <div class="panel-item-meta">${p.portCount}p &bull; ${used} used</div>
        </div>
        <button class="btn-remove-panel" onclick="event.stopPropagation();removePanel('${p.id}')" title="Remove">×</button>
      </div>
    `;
  }).join('');
}

function renderMain() {
  const main = document.getElementById('main');
  const empty = document.getElementById('emptyState');

  main.querySelectorAll('.panel-editor').forEach(e => e.remove());

  if (!state.panels.length) {
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  state.panels.forEach(panel => {
    const el = buildPanelEditor(panel);
    main.appendChild(el);
  });
}

function buildPanelEditor(panel) {
  const div = document.createElement('div');
  div.className = 'panel-editor';
  div.id = 'editor_' + panel.id;

  div.innerHTML = `
    <div class="panel-editor-header">
      <input class="panel-name-input" value="${escHtml(panel.name)}" placeholder="Panel name..."
        oninput="panelNameChanged('${panel.id}', this.value)">
      <select class="port-count-select" onchange="portCountChanged('${panel.id}', this.value)">
        ${[8,12,24,48].map(n => `<option value="${n}" ${n === panel.portCount ? 'selected' : ''}>${n} port</option>`).join('')}
      </select>
      <div class="port-numbering-wrap">
        <span class="port-numbering-label">From</span>
        <input class="port-numbering-input" type="number" min="1" value="${panel.startFrom || 1}"
          oninput="panelStartFromChanged('${panel.id}', this.value)" title="Start port number from">
      </div>
      <div class="port-numbering-wrap">
        <span class="port-numbering-label">Prefix</span>
        <input class="port-prefix-input" type="text" maxlength="4" value="${escHtml(panel.prefix || '')}"
          oninput="panelPrefixChanged('${panel.id}', this.value)" placeholder="e.g. A-" title="Port number prefix">
      </div>
    </div>
    <div class="panel-body">
      ${buildPortGrid(panel)}
    </div>
  `;
  return div;
}

function buildPortGrid(panel) {
  const count = panel.portCount;
  const start = panel.startFrom || 1;
  const prefix = panel.prefix || '';

  // Layout: 8/12 = 1 row; 24 = 2 rows of 12; 48 = 2 rows of 24
  let rowSizes;
  if (count <= 12) rowSizes = [count];
  else if (count === 24) rowSizes = [12, 12];
  else rowSizes = [24, 24];

  let portIndex = 0;
  const rows = rowSizes.map(size => {
    const row = Array.from({length: size}, (_, i) => start + portIndex + i);
    portIndex += size;
    return row;
  });

  const rowsHtml = rows.map(row => {
    const portsHtml = row.map(n => {
      const key = prefix + n;
      const p = panel.ports[key];
      const type = p?.type;
      const typeInfo = type ? TYPES[type] : null;
      const bg = typeInfo ? typeInfo.color : '';
      const style = bg ? `background:${bg}; border-color:${bg};` : '';
      const labelled = p?.type || p?.label ? 'labelled' : '';
      const abbr = typeInfo ? typeInfo.abbr : '';
      const label = p?.label ? escHtml(p.label) : '';
      const displayNum = prefix ? `${prefix}${n}` : String(n).padStart(2,'0');
      const cableDot = p?.cable ? `<span style="position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%;background:${CABLE_COLOURS[p.cable] || p.cable};display:block"></span>` : '';
      return `
        <div class="port ${labelled}" style="${style}" onclick="openPortModal('${panel.id}','${key}')" title="Port ${key}${p?.label ? ' — ' + p.label : ''}">
          ${cableDot}
          <span class="port-num">${displayNum}</span>
          ${abbr ? `<span class="port-type">${abbr}</span>` : ''}
          ${label ? `<span class="port-label-text">${label}</span>` : ''}
        </div>
      `;
    }).join('');
    return `<div class="port-row">${portsHtml}</div>`;
  }).join('');

  return `<div class="port-grid">${rowsHtml}</div>`;
}

// ── Modal ────────────────────────────────────
function openPortModal(panelId, portIndex) {
  editingPanelId = panelId;
  editingPortIndex = portIndex;
  const panel = getPanel(panelId);
  const port = panel?.ports[portIndex] || {};

  document.getElementById('modalTitle').textContent = `Port ${portIndex}`;
  document.getElementById('editType').value = port.type || '';
  document.getElementById('editLabel').value = port.label || '';
  document.getElementById('editSwitch').value = port.switch || '';
  document.getElementById('editSwitchPort').value = port.switchPort || '';
  document.getElementById('editNotes').value = port.notes || '';

  selectedColour = port.cable || null;
  document.querySelectorAll('.cable-colour-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.colour === selectedColour);
  });

  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('editLabel').focus();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingPanelId = null;
  editingPortIndex = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function selectColour(colour, btn) {
  selectedColour = selectedColour === colour ? null : colour;
  document.querySelectorAll('.cable-colour-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.colour === selectedColour);
  });
}

function savePort() {
  const panel = getPanel(editingPanelId);
  if (!panel) return;
  const type = document.getElementById('editType').value;
  const label = document.getElementById('editLabel').value.trim();
  const sw = document.getElementById('editSwitch').value.trim();
  const swPort = document.getElementById('editSwitchPort').value.trim();
  const notes = document.getElementById('editNotes').value.trim();
  if (!type && !label && !notes && !selectedColour && !sw && !swPort) {
    delete panel.ports[editingPortIndex];
  } else {
    panel.ports[editingPortIndex] = { type, label, switch: sw, switchPort: swPort, notes, cable: selectedColour };
  }
  closeModal();
  render();
}

function clearPort() {
  const panel = getPanel(editingPanelId);
  if (panel) delete panel.ports[editingPortIndex];
  closeModal();
  render();
}

function updateTypeColour() { /* visual feedback hook */ }

// ── Save / Load ──────────────────────────────
function saveJSON() {
  const data = JSON.stringify({ siteName: state.siteName, panels: state.panels }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (state.siteName || 'fieldkit-patch-panel') + '.json';
  a.click();
}

function loadJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      state.siteName = data.siteName || '';
      state.panels = data.panels || [];
      state.activePanel = state.panels.length ? state.panels[0].id : null;
      document.getElementById('siteName').value = state.siteName;
      render();
    } catch { alert('Invalid file'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── Print ────────────────────────────────────
function printMap() {
  const doc = document.getElementById('printDoc');
  const date = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
  const siteName = state.siteName || 'Unnamed Site';

  let html = `
    <div class="print-header">
      <div>
        <div class="print-site-name">${escHtml(siteName)}</div>
        <div class="print-meta">Patch Panel Documentation</div>
      </div>
      <div class="print-meta">${date}</div>
    </div>
  `;

  state.panels.forEach(panel => {
    const start = panel.startFrom || 1;
    const prefix = panel.prefix || '';
    html += `<div class="print-panel">
      <div class="print-panel-title">${escHtml(panel.name)} — ${panel.portCount} port</div>
      <table class="print-port-table">
        <thead>
          <tr>
            <th>Port</th>
            <th>Type</th>
            <th>Label</th>
            <th>Switch</th>
            <th>Switch Port</th>
            <th>Cable</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody>
    `;
    for (let i = 0; i < panel.portCount; i++) {
      const n = start + i;
      const key = prefix + n;
      const p = panel.ports[key] || {};
      const typeInfo = p.type ? TYPES[p.type] : null;
      const typeBadge = typeInfo
        ? `<span class="print-type-badge" style="background:${typeInfo.color}">${p.type}</span>`
        : '<span style="color:#bbb">—</span>';
      const cableDot = p.cable
        ? `<span class="print-cable-dot" style="background:${CABLE_COLOURS[p.cable] || p.cable}"></span> ${p.cable}`
        : '—';
      const swDest = p.switch && p.switchPort ? `${escHtml(p.switch)} ${escHtml(p.switchPort)}`
        : p.switch ? escHtml(p.switch)
        : p.switchPort ? escHtml(p.switchPort)
        : '—';
      html += `<tr>
        <td>${key}</td>
        <td>${typeBadge}</td>
        <td class="label-col">${escHtml(p.label || '—')}</td>
        <td>${escHtml(p.switch || '—')}</td>
        <td>${escHtml(p.switchPort || '—')}</td>
        <td>${cableDot}</td>
        <td>${escHtml(p.notes || '—')}</td>
      </tr>`;
    }
    html += `</tbody></table></div>`;
  });

  html += `<div class="print-footer">
    <span>Generated by FieldKit — fieldkit.uk</span>
    <span>${date}</span>
  </div>`;

  doc.innerHTML = html;
  window.print();
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Keyboard close
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Init with one panel
addPanel();
</script>
</body>
</html>
